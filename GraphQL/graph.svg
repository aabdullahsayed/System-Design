<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">GraphQL: The Modern Data Aggregator</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#b2f2bb">
       <rect x="40" y="220" width="180" height="220" rx="10" stroke-width="2" transform="rotate(1 130 330)"/>
    </g>
    <text x="130" y="260" text-anchor="middle" font-size="18" font-weight="bold">Client</text>
    
    <rect x="60" y="290" width="140" height="120" rx="5" fill="#ffffff" stroke-width="1.5"/>
    <text x="70" y="315" font-size="11" font-family="monospace" fill="#e64980">query {</text>
    <text x="85" y="335" font-size="11" font-family="monospace" fill="#e64980">user(id: 1) {</text>
    <text x="100" y="355" font-size="11" font-family="monospace" fill="#e64980">name</text>
    <text x="100" y="375" font-size="11" font-family="monospace" fill="#e64980">posts { title }</text>
    <text x="85" y="395" font-size="11" font-family="monospace" fill="#e64980">}</text>
    <text x="70" y="405" font-size="11" font-family="monospace" fill="#e64980">}</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#f3f0ff"> <rect x="360" y="180" width="240" height="300" rx="15" stroke-width="2.5" transform="rotate(-0.5 480 330)"/>
    </g>
    <circle cx="480" cy="240" r="30" fill="#e64980" opacity="0.2" stroke="#e64980" stroke-width="2"/>
    <text x="480" y="245" text-anchor="middle" font-size="20" font-weight="bold" fill="#e64980">GraphQL</text>
    
    <rect x="385" y="290" width="190" height="150" rx="8" fill="#ffffff" stroke-width="1.5"/>
    <text x="480" y="315" text-anchor="middle" font-size="14" font-weight="bold">Resolver Layer</text>
    <text x="480" y="345" text-anchor="middle" font-size="12" fill="#495057">Parsing Query...</text>
    <text x="480" y="370" text-anchor="middle" font-size="12" fill="#495057">Fetching Data...</text>
    <text x="480" y="395" text-anchor="middle" font-size="12" fill="#495057">Shaping Response...</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <rect x="740" y="160" width="160" height="70" rx="8" fill="#ffd8a8" stroke-width="2"/>
    <text x="820" y="200" text-anchor="middle" font-weight="bold">SQL Database</text>
    
    <rect x="740" y="280" width="160" height="70" rx="8" fill="#a5d8ff" stroke-width="2"/>
    <text x="820" y="320" text-anchor="middle" font-weight="bold">Post Service</text>
    
    <rect x="740" y="400" width="160" height="70" rx="8" fill="#b2f2bb" stroke-width="2"/>
    <text x="820" y="440" text-anchor="middle" font-weight="bold">Legacy REST API</text>
  </g>

  <g filter="url(#rough)" stroke="#495057" stroke-width="2" fill="none">
    <path d="M 220 330 L 360 330" stroke="#e64980" stroke-width="3"/>
    <path d="M 345 318 L 363 330 L 345 342" stroke="#e64980"/>

    <path d="M 600 300 L 730 200" stroke-dasharray="5,5"/>
    <path d="M 600 330 L 730 320" stroke-dasharray="5,5"/>
    <path d="M 600 360 L 730 430" stroke-dasharray="5,5"/>
  </g>

  <text x="480" y="580" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"GraphQL: Giving frontend devs enough rope to query the whole company at once."</text>
</svg>
