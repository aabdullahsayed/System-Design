<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <text x="450" y="50" text-anchor="middle" font-size="26" font-weight="bold" fill="#1e1e1e">API Protocol Decision Matrix</text>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#a5d8ff">
    <rect x="50" y="100" width="180" height="250" rx="10" stroke-width="2" transform="rotate(-1 140 225)"/>
    <text x="140" y="140" text-anchor="middle" font-weight="bold" font-size="20" fill="#000">HTTP/S</text>
    <text x="140" y="180" text-anchor="middle" font-size="14" fill="#495057">Pattern:</text>
    <text x="140" y="200" text-anchor="middle" font-size="14" font-weight="bold">Req / Resp</text>
    <text x="140" y="240" text-anchor="middle" font-size="12" font-style="italic">"The standard web"</text>
    <path d="M 80 280 L 200 280" stroke-width="1.5" opacity="0.3"/>
    <text x="140" y="310" text-anchor="middle" font-size="13" font-weight="bold">Public APIs</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#b2f2bb">
    <rect x="260" y="100" width="180" height="250" rx="10" stroke-width="2" transform="rotate(1 350 225)"/>
    <text x="350" y="140" text-anchor="middle" font-weight="bold" font-size="20" fill="#000">WebSockets</text>
    <text x="350" y="180" text-anchor="middle" font-size="14" fill="#495057">Pattern:</text>
    <text x="350" y="200" text-anchor="middle" font-size="14" font-weight="bold">Full Duplex</text>
    <text x="350" y="240" text-anchor="middle" font-size="12" font-style="italic">"Always open"</text>
    <path d="M 290 280 L 410 280" stroke-width="1.5" opacity="0.3"/>
    <text x="350" y="310" text-anchor="middle" font-size="13" font-weight="bold">Real-time Chat</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#ffd8a8">
    <rect x="470" y="100" width="180" height="250" rx="10" stroke-width="2" transform="rotate(-0.5 560 225)"/>
    <text x="560" y="140" text-anchor="middle" font-weight="bold" font-size="20" fill="#000">gRPC</text>
    <text x="560" y="180" text-anchor="middle" font-size="14" fill="#495057">Pattern:</text>
    <text x="560" y="200" text-anchor="middle" font-size="14" font-weight="bold">Binary RPC</text>
    <text x="560" y="240" text-anchor="middle" font-size="12" font-style="italic">"Ultra Fast"</text>
    <path d="M 500 280 L 620 280" stroke-width="1.5" opacity="0.3"/>
    <text x="560" y="310" text-anchor="middle" font-size="13" font-weight="bold">Microservices</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#eebefa">
    <rect x="680" y="100" width="180" height="250" rx="10" stroke-width="2" transform="rotate(2 770 225)"/>
    <text x="770" y="140" text-anchor="middle" font-weight="bold" font-size="20" fill="#000">AMQP</text>
    <text x="770" y="180" text-anchor="middle" font-size="14" fill="#495057">Pattern:</text>
    <text x="770" y="200" text-anchor="middle" font-size="14" font-weight="bold">Message Queue</text>
    <text x="770" y="240" text-anchor="middle" font-size="12" font-style="italic">"Async Buffer"</text>
    <path d="M 710 280 L 830 280" stroke-width="1.5" opacity="0.3"/>
    <text x="770" y="310" text-anchor="middle" font-size="13" font-weight="bold">Task Queues</text>
  </g>

  <text x="450" y="450" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Match the protocol to the conversation style, not just the code."</text>
</svg>
