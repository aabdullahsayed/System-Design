<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Segoe Print', 'Bradley Hand', sans-serif; color: #1e1e1e;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>

    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <path d="M 330 42 Q 480 48, 630 38" stroke="#ffec99" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#rough)"/>

  <text x="480" y="38" text-anchor="middle" font-size="26" font-weight="bold" fill="#1e1e1e">Single-Server Request Lifecycle</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <g fill="#eebefa">
       <rect x="380" y="60" width="160" height="75" rx="8" stroke-width="2" transform="rotate(-1 460 95)"/>
       <rect x="378" y="62" width="162" height="73" rx="10" stroke-width="1.5" opacity="0.5" transform="rotate(0.5 460 95)"/>
    </g>

    <g fill="#b2f2bb">
       <rect x="40" y="200" width="220" height="280" rx="12" stroke-width="2" transform="rotate(1.5 150 340)"/>
       <rect x="42" y="198" width="216" height="284" rx="14" stroke-width="1.5" opacity="0.6"/>
    </g>

    <g fill="#a5d8ff">
       <rect x="640" y="160" width="260" height="340" rx="12" stroke-width="2" transform="rotate(-0.8 770 330)"/>
       <rect x="638" y="162" width="264" height="336" rx="15" stroke-width="1.5" opacity="0.6"/>
    </g>

    <g fill="#ffffff">
       <rect x="65" y="260" width="170" height="80" rx="6" stroke-width="2" transform="rotate(-1 150 300)"/>
       <rect x="63" y="262" width="172" height="78" rx="8" stroke-width="1" opacity="0.7"/>

       <rect x="110" y="365" width="80" height="95" rx="10" stroke-width="2" transform="rotate(2 150 410)"/>
       <rect x="108" y="367" width="82" height="93" rx="12" stroke-width="1" opacity="0.7"/>
       <path d="M 115 440 L 185 442" stroke-width="1.5"/>
    </g>

    <g fill="#ffffff">
       <rect x="670" y="235" width="200" height="65" rx="6" stroke-width="2" transform="rotate(1 770 265)"/>
       <rect x="668" y="237" width="202" height="63" rx="8" stroke-width="1" opacity="0.7"/>
       
       <rect x="670" y="325" width="200" height="65" rx="6" stroke-width="2" transform="rotate(-1 770 355)"/>
       <rect x="668" y="327" width="202" height="63" rx="8" stroke-width="1" opacity="0.7"/>
       
       <rect x="670" y="415" width="200" height="55" rx="6" stroke-width="2" transform="rotate(0.5 770 440)"/>
    </g>

    <g stroke-width="2.5">
       <path d="M 170 195 Q 180 100, 365 100" stroke="#495057"/>
       <path d="M 350 88 L 368 100 L 348 110" stroke="#495057"/> <path d="M 168 195 Q 178 102, 363 98" stroke="#495057" stroke-width="1" opacity="0.4" />

       <path d="M 430 140 Q 420 195, 275 215" stroke="#495057"/>
       <path d="M 290 205 L 273 216 L 292 225" stroke="#495057"/> <path d="M 428 140 Q 418 197, 273 213" stroke="#495057" stroke-width="1" opacity="0.4" />

       <path d="M 270 300 Q 450 280, 620 300" stroke="#c92a2a" /> <path d="M 605 288 L 623 300 L 605 310" stroke="#c92a2a" />
       <path d="M 270 298 Q 450 278, 620 298" stroke="#c92a2a" stroke-width="1" opacity="0.4"/>

       <path d="M 625 380 Q 450 400, 275 380" stroke="#087f5b" /> <path d="M 290 368 L 272 380 L 290 390" stroke="#087f5b" />
       <path d="M 625 382 Q 450 402, 275 382" stroke="#087f5b" stroke-width="1" opacity="0.4"/>
    </g>
  </g>

  <text x="460" y="95" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">DNS Provider</text>
  <text x="460" y="115" text-anchor="middle" font-size="13" fill="#495057">app.demo.com → IP</text>

  <text x="150" y="235" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Clients</text>
  <text x="150" y="295" text-anchor="middle" font-size="16" fill="#1e1e1e">Web Browser</text>
  <text x="150" y="315" text-anchor="middle" font-size="12" fill="#495057">HTML/CSS/JS</text>
  
  <text x="150" y="415" text-anchor="middle" font-size="16" fill="#1e1e1e">Mobile App</text>
  <text x="150" y="430" text-anchor="middle" font-size="12" fill="#495057">JSON API</text>

  <text x="770" y="195" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">Single Server</text>
  <text x="770" y="215" text-anchor="middle" font-size="14" fill="#495057">IP: 192.168.1.100</text>

  <text x="770" y="265" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Web Application</text>
  <text x="770" y="285" text-anchor="middle" font-size="13" fill="#495057">Business Logic</text>

  <text x="770" y="355" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Database</text>
  <text x="770" y="375" text-anchor="middle" font-size="13" fill="#495057">Data Storage</text>

  <text x="770" y="448" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Cache</text>

  <g transform="rotate(-6 230 110)">
    <rect x="150" y="90" width="160" height="22" fill="#ffffff" opacity="0.8" rx="4" />
    <text x="230" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="#495057">1. Request IP</text>
  </g>

  <g transform="rotate(8 340 185)">
    <rect x="250" y="170" width="180" height="22" fill="#ffffff" opacity="0.8" rx="4" />
    <text x="340" y="186" text-anchor="middle" font-size="14" font-weight="bold" fill="#495057">2. Returns IP address</text>
  </g>

  <g transform="rotate(-3 445 275)">
    <rect x="360" y="260" width="170" height="22" fill="#ffffff" opacity="0.9" rx="4" />
    <text x="445" y="276" text-anchor="middle" font-size="15" font-weight="bold" fill="#c92a2a">3. HTTP GET /product</text>
  </g>

  <g transform="rotate(3 445 395)">
    <rect x="360" y="380" width="170" height="22" fill="#ffffff" opacity="0.9" rx="4" />
    <text x="445" y="396" text-anchor="middle" font-size="15" font-weight="bold" fill="#087f5b">4. JSON Response</text>
  </g>

</svg>
