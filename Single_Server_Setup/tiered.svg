<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>

    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Phase 2: Tiered Architecture (Decoupled)</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#b2f2bb"> <rect x="50" y="220" width="160" height="200" rx="10" stroke-width="2" transform="rotate(1 130 320)"/>
    </g>
    <text x="130" y="255" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">Clients</text>
    <path d="M 80 300 L 180 302" stroke-width="2" opacity="0.5"/>
    <path d="M 80 340 L 180 338" stroke-width="2" opacity="0.5"/>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#a5d8ff"> <rect x="350" y="150" width="220" height="340" rx="12" stroke-width="2" transform="rotate(-1 460 320)"/>
    </g>
    <text x="460" y="190" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Web Tier</text>
    
    <rect x="375" y="230" width="170" height="60" rx="6" fill="#ffffff" stroke-width="2" transform="rotate(1 460 260)"/>
    <text x="460" y="265" text-anchor="middle" font-size="16" fill="#1e1e1e">App Server A</text>
    
    <rect x="375" y="320" width="170" height="60" rx="6" fill="#ffffff" stroke-width="2" transform="rotate(-1 460 350)"/>
    <text x="460" y="355" text-anchor="middle" font-size="16" fill="#1e1e1e">App Server B</text>
    
    <text x="460" y="440" text-anchor="middle" font-size="14" fill="#495057" font-style="italic">(Handles Logic &amp; APIs)</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#ffd8a8"> <rect x="700" y="200" width="200" height="240" rx="12" stroke-width="2" transform="rotate(1.5 800 320)"/>
    </g>
    <text x="800" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Data Tier</text>
    
    <ellipse cx="800" cy="300" rx="50" ry="15" fill="#ffffff" stroke-width="2" />
    <rect x="750" y="300" width="100" height="80" fill="#ffffff" stroke-width="0" />
    <line x1="750" y1="300" x2="750" y2="380" stroke-width="2" />
    <line x1="850" y1="300" x2="850" y2="380" stroke-width="2" />
    <ellipse cx="800" cy="380" rx="50" ry="15" fill="#ffffff" stroke-width="2" />
    
    <text x="800" y="345" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Database</text>
    <text x="800" y="415" text-anchor="middle" font-size="14" fill="#495057">SQL or NoSQL</text>
  </g>

  <g filter="url(#rough)" stroke="#495057" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 215 320 Q 280 310, 345 320" />
    <path d="M 330 308 L 348 320 L 330 332" />
    
    <path d="M 575 320 Q 635 320, 695 320" stroke="#c92a2a"/>
    <path d="M 680 308 L 698 320 L 680 332" stroke="#c92a2a"/>
    
    <path d="M 695 360 Q 635 360, 575 360" stroke="#087f5b" stroke-dasharray="8,5"/>
    <path d="M 590 348 L 572 360 L 590 372" stroke="#087f5b"/>
  </g>

  <text x="280" y="300" text-anchor="middle" font-size="14" font-weight="bold" transform="rotate(-5 280 300)">HTTP Requests</text>
  <text x="640" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">Queries</text>
  <text x="640" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">Data Results</text>

  <text x="480" y="580" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Separation of concerns: because your DB doesn't care about your CSS."</text>

</svg>
