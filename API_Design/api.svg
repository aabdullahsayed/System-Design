<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Choosing the Right API Protocol</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#a5d8ff">
       <rect x="50" y="120" width="250" height="180" rx="10" stroke-width="2" transform="rotate(-1 175 210)"/>
    </g>
    <text x="175" y="160" text-anchor="middle" font-size="20" font-weight="bold">HTTP (REST/GraphQL)</text>
    <text x="175" y="195" text-anchor="middle" font-size="14">Stateless / Request-Response</text>
    <path d="M 80 230 L 270 230" stroke="#1e1e1e" stroke-width="1.5" opacity="0.3"/>
    <text x="175" y="260" text-anchor="middle" font-size="14" fill="#1e40af">Best for: Web/Mobile Apps</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#b2f2bb">
       <rect x="350" y="120" width="250" height="180" rx="10" stroke-width="2" transform="rotate(1 475 210)"/>
    </g>
    <text x="475" y="160" text-anchor="middle" font-size="20" font-weight="bold">WebSockets</text>
    <text x="475" y="195" text-anchor="middle" font-size="14">Bi-directional / Real-time</text>
    <path d="M 380 230 L 570 230" stroke="#1e1e1e" stroke-width="1.5" opacity="0.3"/>
    <text x="475" y="260" text-anchor="middle" font-size="14" fill="#15803d">Best for: Chats / Streaming</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#ffd8a8">
       <rect x="650" y="120" width="250" height="180" rx="10" stroke-width="2" transform="rotate(-0.5 775 210)"/>
    </g>
    <text x="775" y="160" text-anchor="middle" font-size="20" font-weight="bold">gRPC (Binary)</text>
    <text x="775" y="195" text-anchor="middle" font-size="14">Low Latency / Internal</text>
    <path d="M 680 230 L 870 230" stroke="#1e1e1e" stroke-width="1.5" opacity="0.3"/>
    <text x="775" y="260" text-anchor="middle" font-size="14" fill="#a16207">Best for: Microservices</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#fff9db">
    <rect x="230" y="380" width="500" height="150" rx="15" stroke-width="3" transform="rotate(0.5 480 455)"/>
    <text x="480" y="420" text-anchor="middle" font-size="22" font-weight="bold">Senior Decision Matrix</text>
    <text x="280" y="460" font-size="16" fill="#1e1e1e">• User facing? → REST / GraphQL</text>
    <text x="280" y="490" font-size="16" fill="#1e1e1e">• Service to Service? → gRPC</text>
    <text x="280" y="520" font-size="16" fill="#1e1e1e">• Live updates needed? → WebSockets / GraphQL Subscriptions</text>
  </g>

  <text x="480" y="590" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Protocols are languages. Don't speak gRPC to a browser that only understands HTTP."</text>
</svg>
