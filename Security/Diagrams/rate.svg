<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <!-- Sketchy Whiteboard Filter (Applied to shapes ONLY to keep text sharp) -->
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">API Rate Limiting (The Bouncer)</text>

  <!-- ================= SHAPES (With Hand-Drawn Filter) ================= -->
  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
    
    <!-- 1. Normal User (Top Left) -->
    <rect x="60" y="150" width="140" height="100" rx="12" fill="#b2f2bb" transform="rotate(-1 130 200)"/>
    
    <!-- 2. Bad Actor / Spammer (Bottom Left) -->
    <rect x="60" y="400" width="140" height="100" rx="12" fill="#ffc9c9" transform="rotate(1 130 450)"/>
    
    <!-- 3. API Gateway / Rate Limiter (Center Shield) -->
    <rect x="380" y="120" width="200" height="420" rx="15" fill="#ffec99" stroke-width="3" transform="rotate(0.5 480 330)"/>
    <!-- Inner box representing the Redis Cache/Counter -->
    <rect x="400" y="300" width="160" height="80" rx="6" fill="#ffffff" stroke-dasharray="6,4" stroke-width="2"/>

    <!-- 4. Backend API Server (Right) -->
    <rect x="740" y="270" width="160" height="120" rx="12" fill="#a5d8ff" transform="rotate(-0.5 820 330)"/>

    <!-- ================= ARROWS ================= -->

    <!-- Normal Traffic Arrow (Allowed) -->
    <path d="M 200 200 Q 290 180, 380 200" stroke="#087f5b" stroke-width="3.5" />
    <path d="M 360 188 L 385 200 L 360 212" fill="#087f5b" stroke="#087f5b"/>

    <!-- Gateway to Backend (Forwarded) -->
    <path d="M 580 280 Q 660 260, 740 290" stroke="#1e40af" stroke-width="3.5" />
    <path d="M 720 278 L 745 290 L 720 302" fill="#1e40af" stroke="#1e40af"/>
    
    <path d="M 740 360 Q 660 380, 580 360" stroke="#087f5b" stroke-width="3.5" stroke-dasharray="8,5" />
    <path d="M 600 348 L 575 360 L 600 372" fill="#087f5b" stroke="#087f5b"/>

    <!-- Spam Traffic Arrows (Aggressive) -->
    <path d="M 200 430 L 380 430" stroke="#c92a2a" stroke-width="3.5" />
    <path d="M 200 450 L 380 450" stroke="#c92a2a" stroke-width="3.5" />
    <path d="M 200 470 L 380 470" stroke="#c92a2a" stroke-width="3.5" />
    
    <!-- The Blocked Bounce (Rejected) -->
    <path d="M 380 490 Q 290 560, 200 520" stroke="#c92a2a" stroke-width="4" stroke-dasharray="8,5" />
    <path d="M 225 530 L 195 518 L 215 505" fill="#c92a2a" stroke="#c92a2a"/>

  </g>

  <!-- ================= SHARP TEXT (No Filter for Readability) ================= -->

  <!-- Normal User Text -->
  <text x="130" y="195" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">Normal User</text>
  <text x="130" y="220" text-anchor="middle" font-size="14" fill="#495057">Web Browser</text>

  <!-- Spammer Text -->
  <text x="130" y="445" text-anchor="middle" font-size="20" font-weight="bold" fill="#c92a2a">Malicious Bot</text>
  <text x="130" y="470" text-anchor="middle" font-size="14" fill="#1e1e1e">Script Loop / DDoS</text>

  <!-- API Gateway Text -->
  <text x="480" y="170" text-anchor="middle" font-size="22" font-weight="bold" fill="#e67700">API Gateway</text>
  <text x="480" y="200" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">Rate Limiter</text>
  
  <text x="480" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">Rule: Max 100 req/min</text>

  <!-- Redis Cache Text inside Gateway -->
  <text x="480" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">Fast Counter (Redis)</text>
  <text x="480" y="360" text-anchor="middle" font-size="14" font-family="monospace" fill="#495057">User_A: 5 / 100</text>
  <text x="480" y="380" text-anchor="middle" font-size="14" font-family="monospace" fill="#c92a2a">Bot_IP: 9,999 / 100</text>

  <!-- Backend API Text -->
  <text x="820" y="325" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e40af">Backend API</text>
  <text x="820" y="350" text-anchor="middle" font-size="14" fill="#1e1e1e">&amp; Database</text>
  <text x="820" y="375" text-anchor="middle" font-size="12" fill="#087f5b">(Safe &amp; Stable)</text>

  <!-- Flow Labels (White boxes for contrast) -->
  <rect x="230" y="150" width="110" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="285" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">3 req / min</text>

  <rect x="600" y="250" width="100" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="650" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Forwarded</text>

  <rect x="230" y="395" width="130" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="295" y="413" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">10,000 req / sec</text>

  <rect x="220" y="525" width="200" height="30" fill="#ffffff" stroke="none" opacity="0.95"/>
  <text x="320" y="546" text-anchor="middle" font-size="16" font-weight="bold" fill="#c92a2a">HTTP 429: Too Many Requests</text>

  <!-- Humorous Footer -->
  <text x="480" y="610" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Rate Limiting: The digital equivalent of 'Take a number and wait your turn.'"</text>

</svg>
