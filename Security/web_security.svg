<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  <text x="480" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">The Big 3: Web Attack Vectors</text>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round">
    <rect x="50" y="80" width="860" height="150" rx="10" fill="#fff5f5" stroke-width="2"/>
    <text x="70" y="110" font-size="20" font-weight="bold" fill="#c92a2a">1. SQL Injection</text>
    
    <rect x="70" y="140" width="80" height="50" rx="5" fill="#ffffff" stroke-width="2"/>
    <text x="110" y="170" text-anchor="middle" font-weight="bold">Attacker</text>
    
    <path d="M 160 165 L 350 165" stroke="#c92a2a" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="255" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#c92a2a">Input: '; DROP TABLE users;</text>
    
    <rect x="360" y="140" width="80" height="50" rx="5" fill="#a5d8ff" stroke-width="2"/>
    <text x="400" y="170" text-anchor="middle" font-weight="bold">API</text>
    
    <path d="M 450 165 L 680 165" stroke="#c92a2a" stroke-width="3"/>
    <text x="565" y="155" text-anchor="middle" font-family="monospace" font-size="12" fill="#c92a2a">Query Concatenation!</text>
    
    <ellipse cx="740" cy="165" rx="40" ry="15" fill="#ffffff" stroke-width="2"/>
    <path d="M 720 150 L 760 180 M 760 150 L 720 180" stroke="#c92a2a" stroke-width="4"/>
    <text x="830" y="170" font-weight="bold" fill="#c92a2a">Data Deleted!</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round">
    <rect x="50" y="250" width="860" height="150" rx="10" fill="#e7f5ff" stroke-width="2"/>
    <text x="70" y="280" font-size="20" font-weight="bold" fill="#1e40af">2. XSS (Stored)</text>
    
    <text x="110" y="320" text-anchor="middle" font-weight="bold">Attacker</text>
    <path d="M 160 315 L 350 315" stroke="#1e40af" stroke-width="2"/>
    <text x="255" y="305" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">Save: &lt;script&gt;steal()&lt;/script&gt;</text>
    
    <ellipse cx="400" cy="315" rx="30" ry="10" fill="#ffffff" stroke-width="2"/>
    <text x="400" y="345" text-anchor="middle" font-size="12" font-weight="bold">DB stores it</text>
    
    <path d="M 440 315 L 680 315" stroke="#1e40af" stroke-width="2"/>
    <text x="560" y="305" text-anchor="middle" font-size="12" fill="#1e40af">API loads comment to UI</text>
    
    <rect x="690" y="290" width="80" height="50" rx="5" fill="#ffffff" stroke-width="2"/>
    <text x="730" y="320" text-anchor="middle" font-weight="bold">Victim</text>
    <text x="830" y="315" font-weight="bold" fill="#c92a2a">Script Executes!</text>
    <text x="830" y="335" font-size="12" fill="#c92a2a">(Session Stolen)</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round">
    <rect x="50" y="420" width="860" height="150" rx="10" fill="#f4fce3" stroke-width="2"/>
    <text x="70" y="450" font-size="20" font-weight="bold" fill="#2b8a3e">3. CSRF</text>
    
    <rect x="70" y="480" width="80" height="50" rx="5" fill="#ffffff" stroke-width="2"/>
    <text x="110" y="510" text-anchor="middle" font-weight="bold">Evil Site</text>
    
    <path d="M 160 505 L 350 505" stroke="#2b8a3e" stroke-width="3"/>
    <text x="255" y="495" text-anchor="middle" font-size="12" fill="#2b8a3e">Hidden POST /transfer_funds</text>
    
    <rect x="360" y="480" width="100" height="50" rx="5" fill="#ffffff" stroke-width="2"/>
    <text x="410" y="500" text-anchor="middle" font-size="12" font-weight="bold">Victim Browser</text>
    <text x="410" y="520" text-anchor="middle" font-size="12" fill="#495057">+ Bank Cookie</text>
    
    <path d="M 470 505 L 680 505" stroke="#2b8a3e" stroke-width="3"/>
    <text x="575" y="495" text-anchor="middle" font-size="12" fill="#2b8a3e">Auto-attaches Auth Cookie</text>
    
    <rect x="690" y="480" width="80" height="50" rx="5" fill="#a5d8ff" stroke-width="2"/>
    <text x="730" y="510" text-anchor="middle" font-weight="bold">Bank API</text>
    
    <text x="820" y="500" font-weight="bold" fill="#c92a2a">Transfer OK!</text>
    <text x="820" y="520" font-size="12" fill="#c92a2a">(Trusts the cookie)</text>
  </g>

  <line x1="50" y1="240" x2="910" y2="240" stroke="#dee2e6" stroke-width="2" stroke-dasharray="10,5" filter="url(#rough)"/>
  <line x1="50" y1="410" x2="910" y2="410" stroke="#dee2e6" stroke-width="2" stroke-dasharray="10,5" filter="url(#rough)"/>

  <text x="480" y="595" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Never trust user input. Ever. Seriously, don't do it."</text>
</svg>
