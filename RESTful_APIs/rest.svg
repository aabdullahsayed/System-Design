<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">RESTful API Architecture</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#b2f2bb">
       <rect x="40" y="240" width="160" height="180" rx="10" stroke-width="2" transform="rotate(-1 120 330)"/>
    </g>
    <text x="120" y="280" text-anchor="middle" font-size="18" font-weight="bold">Client</text>
    <text x="120" y="310" text-anchor="middle" font-size="12" fill="#495057">(Browser/Mobile)</text>
    
    <rect x="60" y="340" width="120" height="40" rx="5" fill="#ffffff" stroke-width="1.5"/>
    <text x="120" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#c92a2a">JSON Request</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#a5d8ff">
       <rect x="360" y="160" width="260" height="340" rx="12" stroke-width="2.5" transform="rotate(0.5 490 330)"/>
    </g>
    <text x="490" y="200" text-anchor="middle" font-size="20" font-weight="bold">Web Tier (API Server)</text>
    
    <rect x="390" y="230" width="200" height="230" rx="8" fill="#ffffff" stroke-width="1.5"/>
    <text x="400" y="260" font-size="14" font-weight="bold" fill="#1e40af">GET /products</text>
    <text x="400" y="285" font-size="14" font-weight="bold" fill="#15803d">POST /orders</text>
    <text x="400" y="310" font-size="14" font-weight="bold" fill="#a16207">PUT /users/1</text>
    <text x="400" y="335" font-size="14" font-weight="bold" fill="#be123c">DELETE /cart/5</text>
    
    <path d="M 400 355 L 580 355" stroke-width="1" opacity="0.3"/>
    <text x="490" y="385" text-anchor="middle" font-size="12" font-style="italic">Controller Logic</text>
    <text x="490" y="405" text-anchor="middle" font-size="12" font-style="italic">&amp; Data Mapping</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#ffd8a8">
       <ellipse cx="820" cy="300" rx="60" ry="20" fill="#ffffff" stroke-width="2" />
       <rect x="760" y="300" width="120" height="120" fill="#ffffff" stroke-width="0" />
       <line x1="760" y1="300" x2="760" y2="420" stroke-width="2" />
       <line x1="880" y1="300" x2="880" y2="420" stroke-width="2" />
       <ellipse cx="820" cy="420" rx="60" ry="20" fill="#ffffff" stroke-width="2" />
    </g>
    <text x="820" y="370" text-anchor="middle" font-size="18" font-weight="bold">Database</text>
  </g>

  <g filter="url(#rough)" stroke="#495057" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 205 320 L 350 320" stroke="#c92a2a" />
    <path d="M 335 308 L 353 320 L 335 332" stroke="#c92a2a" />
    <text x="275" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">HTTP Method</text>

    <path d="M 625 330 L 750 330" stroke="#1e1e1e" />
    <path d="M 735 318 L 753 330 L 735 342" stroke="#1e1e1e" />

    <path d="M 350 380 L 205 380" stroke="#087f5b" stroke-dasharray="8,5" />
    <path d="M 220 368 L 202 380 L 220 392" stroke="#087f5b" />
    <text x="275" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#087f5b">JSON Data + Status</text>
  </g>

  <text x="480" y="580" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"REST: Because sending 'GET /delete_everything' makes senior devs cry."</text>
</svg>
