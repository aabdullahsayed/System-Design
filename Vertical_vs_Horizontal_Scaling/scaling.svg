<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <g filter="url(#rough)" stroke="#1e1e1e" fill="none">
    <text x="200" y="80" text-anchor="middle" font-size="20" font-weight="bold">Vertical (Scale UP)</text>
    <rect x="150" y="250" width="100" height="120" rx="5" stroke-width="2" fill="#e7f5ff"/>
    <rect x="125" y="180" width="150" height="180" rx="5" stroke-width="3" fill="#a5d8ff" opacity="0.6"/>
    <path d="M 200 170 L 200 120" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="200" y="390" text-anchor="middle">Add RAM/CPU</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="none">
    <text x="700" y="80" text-anchor="middle" font-size="20" font-weight="bold">Horizontal (Scale OUT)</text>
    <rect x="600" y="150" width="80" height="100" rx="5" stroke-width="2" fill="#d3f9d8"/>
    <rect x="720" y="150" width="80" height="100" rx="5" stroke-width="2" fill="#d3f9d8"/>
    <rect x="660" y="270" width="80" height="100" rx="5" stroke-width="2" fill="#d3f9d8"/>
    <text x="700" y="410" text-anchor="middle">Add More Servers</text>
    <path d="M 810 200 L 860 200" stroke-width="3"/>
    <path d="M 810 210 L 860 210" stroke-width="3"/>
  </g>

  <line x1="480" y1="100" x2="480" y2="450" stroke="#dee2e6" stroke-width="2" stroke-dasharray="10,5"/>
</svg>
