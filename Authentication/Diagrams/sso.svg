<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
  </defs>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Single Sign-On (SSO) Architecture</text>

  <!-- ================= SHAPES (Clean, slightly rotated for whiteboard vibe) ================= -->
  
  <!-- Identity Provider (IdP) Center/Top -->
  <rect x="380" y="100" width="220" height="100" rx="12" fill="#eebefa" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(-1 490 150)"/>
  
  <!-- User / Browser Left -->
  <rect x="60" y="240" width="140" height="100" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(1 130 290)"/>
  
  <!-- Service Provider 1 (App A) Right Top -->
  <rect x="740" y="180" width="160" height="90" rx="12" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(-0.5 820 225)"/>
  
  <!-- Service Provider 2 (App B) Right Bottom -->
  <rect x="740" y="340" width="160" height="90" rx="12" fill="#ffec99" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(0.5 820 385)"/>

  <!-- Protocol Cheat Sheet Box Bottom -->
  <rect x="150" y="490" width="660" height="140" rx="12" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(-0.5 480 560)"/>

  <!-- ================= SHARP TEXT & LABELS ================= -->

  <!-- IdP Text -->
  <text x="490" y="145" text-anchor="middle" font-size="22" font-weight="bold" fill="#862e9c">Identity Provider</text>
  <text x="490" y="175" text-anchor="middle" font-size="14" fill="#1e1e1e">Okta / Azure AD</text>

  <!-- User Text -->
  <text x="130" y="290" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">User</text>
  <text x="130" y="315" text-anchor="middle" font-size="14" fill="#495057">Browser</text>

  <!-- App A Text -->
  <text x="820" y="225" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e40af">App A (Jira)</text>
  <text x="820" y="250" text-anchor="middle" font-size="14" fill="#495057">Service Provider</text>

  <!-- App B Text -->
  <text x="820" y="385" text-anchor="middle" font-size="20" font-weight="bold" fill="#e67700">App B (Slack)</text>
  <text x="820" y="410" text-anchor="middle" font-size="14" fill="#495057">Service Provider</text>

  <!-- ================= CLEAN FLOW ARROWS ================= -->

  <!-- 1. User to App A -->
  <path d="M 200 270 Q 450 200, 720 210" fill="none" stroke="#3b82f6" stroke-width="3.5" />
  <path d="M 700 198 L 725 210 L 700 222" fill="#3b82f6"/>
  <rect x="260" y="210" width="120" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="320" y="228" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">1. Access App A</text>

  <!-- 2. App A to IdP -->
  <path d="M 740 190 Q 670 140, 610 140" fill="none" stroke="#862e9c" stroke-width="3.5" stroke-dasharray="8,5" />
  <path d="M 630 152 L 605 140 L 630 128" fill="#862e9c"/>
  <rect x="635" y="145" width="90" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="680" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#862e9c">2. Redirect</text>

  <!-- 3. User logs in to IdP -->
  <path d="M 170 240 Q 250 160, 360 160" fill="none" stroke="#862e9c" stroke-width="3.5" />
  <path d="M 340 148 L 365 160 L 340 172" fill="#862e9c"/>
  <rect x="180" y="165" width="120" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="240" y="182" text-anchor="middle" font-size="14" font-weight="bold" fill="#862e9c">3. Authenticate</text>

  <!-- 4. IdP sends token for App A -->
  <path d="M 580 180 Q 650 220, 720 240" fill="none" stroke="#1e40af" stroke-width="3.5" />
  <path d="M 700 228 L 725 240 L 700 252" fill="#1e40af"/>
  <rect x="580" y="215" width="110" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="635" y="233" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">4. Token/SAML</text>

  <!-- 5. User accesses App B -->
  <path d="M 200 310 Q 450 370, 720 370" fill="none" stroke="#e67700" stroke-width="3.5" />
  <path d="M 700 358 L 725 370 L 700 382" fill="#e67700"/>
  <rect x="260" y="340" width="120" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="320" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67700">5. Access App B</text>

  <!-- 6. Instant access to App B (IdP silent check) -->
  <path d="M 550 190 Q 600 340, 720 390" fill="none" stroke="#087f5b" stroke-width="3.5" stroke-dasharray="8,5" />
  <path d="M 695 380 L 725 390 L 705 400" fill="#087f5b"/>
  <rect x="540" y="300" width="130" height="40" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="605" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">6. Instant Token!</text>
  <text x="605" y="332" text-anchor="middle" font-size="12" fill="#087f5b">(Session Exists)</text>

  <!-- ================= CHEAT SHEET ================= -->
  <text x="480" y="520" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">Identity Protocol Cheat Sheet</text>
  
  <!-- Divider -->
  <line x1="170" y1="535" x2="790" y2="535" stroke="#dee2e6" stroke-width="2"/>

  <!-- Columns -->
  <!-- SAML -->
  <text x="250" y="565" text-anchor="middle" font-size="18" font-weight="bold" fill="#c92a2a">SAML 2.0</text>
  <text x="250" y="590" text-anchor="middle" font-size="14" fill="#495057">XML Data</text>
  <text x="250" y="610" text-anchor="middle" font-size="14" fill="#495057">Corporate Enterprise</text>

  <line x1="360" y1="545" x2="360" y2="615" stroke="#dee2e6" stroke-width="2" />

  <!-- OAuth -->
  <text x="480" y="565" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">OAuth 2.0</text>
  <text x="480" y="590" text-anchor="middle" font-size="14" fill="#495057">JSON Access Tokens</text>
  <text x="480" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Authorization ONLY</text>

  <line x1="600" y1="545" x2="600" y2="615" stroke="#dee2e6" stroke-width="2" />

  <!-- OIDC -->
  <text x="700" y="565" text-anchor="middle" font-size="18" font-weight="bold" fill="#087f5b">OIDC</text>
  <text x="700" y="590" text-anchor="middle" font-size="14" fill="#495057">JWT ID Tokens</text>
  <text x="700" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">Modern Identity</text>

  <!-- Humorous Footer -->
  <text x="480" y="675" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"SSO: Because nobody remembers their password for App #47 anyway."</text>

</svg>
