<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
Pattern    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Authentication (Identity Verification) Flow</text>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#b2f2bb">
       <rect x="50" y="240" width="160" height="200" rx="10" stroke-width="2" transform="rotate(1 130 340)"/>
    </g>
    <text x="130" y="280" text-anchor="middle" font-size="20" font-weight="bold">User</text>
    <text x="130" y="340" text-anchor="middle" font-size="14" fill="#495057">Enters</text>
    <text x="130" y="360" text-anchor="middle" font-size="14" font-weight="bold">Credentials</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#eebefa">
       <rect x="380" y="150" width="240" height="340" rx="12" stroke-width="2.5" transform="rotate(-1 500 320)"/>
    </g>
    <text x="500" y="195" text-anchor="middle" font-size="22" font-weight="bold">Identity Provider</text>
    
    <rect x="410" y="240" width="180" height="80" rx="6" fill="#ffffff" stroke-width="2"/>
    <text x="500" y="275" text-anchor="middle" font-size="16" font-weight="bold">User DB (Store)</text>
    <text x="500" y="295" text-anchor="middle" font-size="12" fill="#495057">Hashed Passwords</text>
    
    <rect x="410" y="360" width="180" height="80" rx="6" fill="#ffffff" stroke-width="2"/>
    <text x="500" y="395" text-anchor="middle" font-size="16" font-weight="bold">JWT Signer</text>
    <text x="500" y="415" text-anchor="middle" font-size="12" fill="#c92a2a">Private Key: ****</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" stroke-linecap="round" fill="none">
    <g fill="#a5d8ff">
       <rect x="750" y="240" width="160" height="200" rx="10" stroke-width="2" transform="rotate(1 830 340)"/>
    </g>
    <text x="830" y="280" text-anchor="middle" font-size="20" font-weight="bold">App</text>
    <text x="830" y="340" text-anchor="middle" font-size="14" fill="#495057">Receives</text>
    <text x="830" y="360" text-anchor="middle" font-size="14" font-weight="bold">Signed Token</text>
  </g>

  <g filter="url(#rough)" stroke="#495057" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 210 320 L 370 320" stroke="#3b82f6" />
    <path d="M 355 308 L 373 320 L 355 332" stroke="#3b82f6" />
    <text x="290" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">1. Post Login</text>

    <path d="M 370 380 L 210 380" stroke="#3b82f6" stroke-dasharray="8,5" />
    <path d="M 225 368 L 207 380 L 225 392" stroke="#3b82f6" />
    <text x="290" y="410" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">2. JWT Issued</text>

    <path d="M 130 445 Q 480 550, 830 445" stroke="#087f5b" />
    <path d="M 815 448 L 833 440 L 825 458" stroke="#087f5b" />
    <text x="480" y="540" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">3. Authenticated Request (Bearer Token)</text>
  </g>

  <text x="480" y="590" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"Authentication is the lock; Authorization is the list of rooms you can enter."</text>
</svg>
