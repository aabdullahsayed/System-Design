<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <!-- Sketchy Whiteboard Filter (Applied to shapes ONLY) -->
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Attribute-Based Access Control (ABAC)</text>

  <!-- ================= SHAPES ================= -->
  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
    
    <!-- 1. User Attributes Box -->
    <rect x="50" y="120" width="180" height="110" rx="12" fill="#a5d8ff" transform="rotate(-1 140 175)"/>
    
    <!-- 2. Environment Attributes Box -->
    <rect x="50" y="270" width="180" height="110" rx="12" fill="#eebefa" transform="rotate(1 140 325)"/>
    
    <!-- 3. Resource Attributes Box -->
    <rect x="50" y="420" width="180" height="110" rx="12" fill="#ffd8a8" transform="rotate(-0.5 140 475)"/>

    <!-- Central Policy Engine -->
    <rect x="380" y="220" width="220" height="200" rx="15" fill="#f8f9fa" stroke-dasharray="10,5" transform="rotate(0.5 490 320)"/>

    <!-- Policy Condition Box inside Engine -->
    <rect x="400" y="290" width="180" height="100" rx="6" fill="#ffffff" stroke-width="1.5"/>

    <!-- Final Decision: Granted -->
    <rect x="740" y="160" width="160" height="100" rx="12" fill="#b2f2bb" transform="rotate(-1 820 210)"/>

    <!-- Final Decision: Denied -->
    <rect x="740" y="380" width="160" height="100" rx="12" fill="#ffc9c9" transform="rotate(1 820 430)"/>

    <!-- ================= ARROWS ================= -->
    
    <!-- Inputs to Engine -->
    <path d="M 230 175 Q 320 175, 380 250" stroke="#1e40af" stroke-width="3" />
    <path d="M 365 240 L 380 250 L 365 255" fill="#1e40af" stroke="#1e40af"/>

    <path d="M 230 325 L 380 325" stroke="#862e9c" stroke-width="3" />
    <path d="M 365 315 L 380 325 L 365 335" fill="#862e9c" stroke="#862e9c"/>

    <path d="M 230 475 Q 320 475, 380 390" stroke="#d9480f" stroke-width="3" />
    <path d="M 365 385 L 380 390 L 365 400" fill="#d9480f" stroke="#d9480f"/>

    <!-- Engine to Granted -->
    <path d="M 600 320 Q 660 210, 740 210" stroke="#087f5b" stroke-width="3.5" />
    <path d="M 720 198 L 740 210 L 720 222" fill="#087f5b" stroke="#087f5b"/>

    <!-- Engine to Denied -->
    <path d="M 600 320 Q 660 430, 740 430" stroke="#c92a2a" stroke-width="3.5" stroke-dasharray="6,4" />
    <path d="M 720 418 L 740 430 L 720 442" fill="#c92a2a" stroke="#c92a2a"/>
  </g>

  <!-- ================= SHARP TEXT (No Filter) ================= -->

  <!-- User Box Text -->
  <text x="140" y="150" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e40af">1. User</text>
  <text x="140" y="175" text-anchor="middle" font-size="14" fill="#1e1e1e">Dept: HR</text>
  <text x="140" y="195" text-anchor="middle" font-size="14" fill="#1e1e1e">Clearance: High</text>

  <!-- Environment Box Text -->
  <text x="140" y="300" text-anchor="middle" font-size="18" font-weight="bold" fill="#862e9c">2. Environment</text>
  <text x="140" y="325" text-anchor="middle" font-size="14" fill="#1e1e1e">IP: 192.168.x (VPN)</text>
  <text x="140" y="345" text-anchor="middle" font-size="14" fill="#1e1e1e">Time: 10:00 AM</text>

  <!-- Resource Box Text -->
  <text x="140" y="450" text-anchor="middle" font-size="18" font-weight="bold" fill="#d9480f">3. Resource</text>
  <text x="140" y="475" text-anchor="middle" font-size="14" fill="#1e1e1e">Type: Payroll DB</text>
  <text x="140" y="495" text-anchor="middle" font-size="14" fill="#1e1e1e">Tag: Confidential</text>

  <!-- Policy Engine Text -->
  <text x="490" y="255" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e1e1e">Policy Engine</text>
  <text x="490" y="275" text-anchor="middle" font-size="12" fill="#495057">(Evaluates real-time)</text>
  
  <text x="410" y="315" font-size="13" font-family="monospace" font-weight="bold" fill="#c92a2a">IF</text>
  <text x="440" y="315" font-size="13" font-family="monospace" fill="#1e1e1e">User == HR</text>
  
  <text x="410" y="340" font-size="13" font-family="monospace" font-weight="bold" fill="#c92a2a">AND</text>
  <text x="450" y="340" font-size="13" font-family="monospace" fill="#1e1e1e">VPN == True</text>

  <text x="410" y="365" font-size="13" font-family="monospace" font-weight="bold" fill="#c92a2a">AND</text>
  <text x="450" y="365" font-size="13" font-family="monospace" fill="#1e1e1e">Time &lt; 5:00 PM</text>

  <!-- Granted Text -->
  <text x="820" y="200" text-anchor="middle" font-size="22" font-weight="bold" fill="#087f5b">Access Granted</text>
  <text x="820" y="230" text-anchor="middle" font-size="14" fill="#1e1e1e">All conditions met.</text>

  <!-- Denied Text -->
  <text x="820" y="420" text-anchor="middle" font-size="22" font-weight="bold" fill="#c92a2a">Access Denied</text>
  <text x="820" y="450" text-anchor="middle" font-size="14" fill="#1e1e1e">Fails condition.</text>

  <!-- Humorous Footer -->
  <text x="480" y="610" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"ABAC: Because the CEO doesn't need to look at payroll at 3:00 AM from a coffee shop in another country."</text>

</svg>
