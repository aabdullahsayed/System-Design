<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <!-- Sketchy Whiteboard Filter (Applied to shapes ONLY) -->
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">Access Control List (ACL)</text>

  <!-- ================= SHAPES ================= -->
  <g filter="url(#rough)" stroke="#1e1e1e" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
    
    <!-- The Resource (A File/Document) -->
    <rect x="550" y="150" width="220" height="280" rx="8" fill="#ffec99" transform="rotate(1 660 290)"/>
    
    <!-- The ACL (The "Guest List" attached to the file) -->
    <rect x="580" y="240" width="240" height="150" rx="5" fill="#ffffff" stroke-width="2" stroke-dasharray="8,4" transform="rotate(-2 700 315)"/>
    <!-- Paperclip holding the list -->
    <path d="M 680 220 L 680 250 A 10 10 0 0 0 700 250 L 700 210 A 15 15 0 0 0 670 210 L 670 260" stroke="#495057" stroke-width="3" transform="rotate(-2 700 315)"/>

    <!-- User A: Alice -->
    <rect x="60" y="160" width="160" height="80" rx="12" fill="#a5d8ff" transform="rotate(-1 140 200)"/>
    
    <!-- User B: Bob -->
    <rect x="60" y="300" width="160" height="80" rx="12" fill="#b2f2bb" transform="rotate(0.5 140 340)"/>
    
    <!-- User C: Charlie -->
    <rect x="60" y="440" width="160" height="80" rx="12" fill="#ffc9c9" transform="rotate(-0.5 140 480)"/>

    <!-- ================= ARROWS ================= -->
    
    <!-- Alice Arrow -->
    <path d="M 230 200 Q 400 180, 530 220" stroke="#1e40af" stroke-width="3.5" />
    <path d="M 510 208 L 535 220 L 510 232" fill="#1e40af" stroke="#1e40af"/>

    <!-- Bob Arrow -->
    <path d="M 230 340 L 530 340" stroke="#087f5b" stroke-width="3.5" />
    <path d="M 510 328 L 535 340 L 510 352" fill="#087f5b" stroke="#087f5b"/>

    <!-- Charlie Arrow (Blocked) -->
    <path d="M 230 480 Q 400 500, 500 420" stroke="#c92a2a" stroke-width="3.5" />
    <!-- The Block X -->
    <path d="M 480 400 L 520 440 M 520 400 L 480 440" stroke="#c92a2a" stroke-width="4"/>
  </g>

  <!-- ================= SHARP TEXT (No Filter) ================= -->

  <!-- Resource Text -->
  <text x="660" y="195" text-anchor="middle" font-size="22" font-weight="bold" fill="#e67700">Q3_Financials.pdf</text>
  <text x="660" y="215" text-anchor="middle" font-size="12" fill="#495057">(The Resource)</text>

  <!-- ACL List Text -->
  <text x="700" y="275" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e" transform="rotate(-2 700 275)">Access Control List</text>
  
  <text x="610" y="305" font-size="14" font-weight="bold" fill="#1e40af" transform="rotate(-2 610 305)">1. Alice</text>
  <text x="700" y="305" font-size="14" fill="#1e1e1e" transform="rotate(-2 700 305)">-> [Read, Write]</text>

  <text x="610" y="335" font-size="14" font-weight="bold" fill="#087f5b" transform="rotate(-2 610 335)">2. Bob</text>
  <text x="700" y="335" font-size="14" fill="#1e1e1e" transform="rotate(-2 700 335)">-> [Read Only]</text>

  <text x="610" y="365" font-size="14" font-style="italic" fill="#adb5bd" transform="rotate(-2 610 365)">(Others Denied)</text>

  <!-- User A Text -->
  <text x="140" y="200" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e40af">Alice</text>
  <text x="140" y="220" text-anchor="middle" font-size="12" fill="#1e1e1e">Attempts Edit</text>

  <!-- User B Text -->
  <text x="140" y="340" text-anchor="middle" font-size="20" font-weight="bold" fill="#087f5b">Bob</text>
  <text x="140" y="360" text-anchor="middle" font-size="12" fill="#1e1e1e">Attempts View</text>

  <!-- User C Text -->
  <text x="140" y="480" text-anchor="middle" font-size="20" font-weight="bold" fill="#c92a2a">Charlie</text>
  <text x="140" y="500" text-anchor="middle" font-size="12" fill="#1e1e1e">Attempts View</text>

  <!-- Arrow Labels -->
  <rect x="300" y="160" width="130" height="30" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="365" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Allowed (Write)</text>

  <rect x="300" y="325" width="130" height="30" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="365" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#087f5b">Allowed (Read)</text>

  <rect x="300" y="470" width="150" height="30" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="375" y="490" text-anchor="middle" font-size="14" font-weight="bold" fill="#c92a2a">Blocked (Not on list)</text>

  <!-- Humorous Footer -->
  <text x="480" y="610" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"ACLs: Treating every single PDF like it's an exclusive nightclub."</text>

</svg>
