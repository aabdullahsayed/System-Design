<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;">
  <defs>
    <!-- Background Dot Grid -->
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
  </defs>

  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <!-- Title -->
  <text x="480" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e1e1e">OAuth 2.0: Delegated Authorization</text>

  <!-- ================= SHAPES (Clean Whiteboard Vibe) ================= -->
  
  <!-- 1. Resource Owner (User) - Top Left -->
  <rect x="80" y="100" width="160" height="100" rx="12" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(-1 160 150)"/>
  
  <!-- 2. Client App - Bottom Left -->
  <rect x="80" y="380" width="160" height="100" rx="12" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(1 160 430)"/>
  
  <!-- 3. Auth Server - Top Right -->
  <rect x="720" y="100" width="180" height="120" rx="12" fill="#eebefa" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(0.5 810 160)"/>
  
  <!-- 4. Resource Server (API) - Bottom Right -->
  <rect x="720" y="380" width="180" height="100" rx="12" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2.5" transform="rotate(-0.5 810 430)"/>

  <!-- ================= SHARP TEXT (Actors) ================= -->

  <!-- User Text -->
  <text x="160" y="145" text-anchor="middle" font-size="20" font-weight="bold" fill="#c92a2a">Resource Owner</text>
  <text x="160" y="170" text-anchor="middle" font-size="14" fill="#1e1e1e">(You)</text>

  <!-- Client Text -->
  <text x="160" y="425" text-anchor="middle" font-size="20" font-weight="bold" fill="#087f5b">Client App</text>
  <text x="160" y="450" text-anchor="middle" font-size="14" fill="#1e1e1e">("Photo Printer App")</text>

  <!-- Auth Server Text -->
  <text x="810" y="145" text-anchor="middle" font-size="20" font-weight="bold" fill="#862e9c">Authorization</text>
  <text x="810" y="170" text-anchor="middle" font-size="20" font-weight="bold" fill="#862e9c">Server</text>
  <text x="810" y="195" text-anchor="middle" font-size="14" fill="#1e1e1e">(Google Login)</text>

  <!-- Resource Server Text -->
  <text x="810" y="425" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e40af">Resource Server</text>
  <text x="810" y="450" text-anchor="middle" font-size="14" fill="#1e1e1e">(Google Drive API)</text>

  <!-- ================= CLEAN FLOW ARROWS ================= -->

  <!-- 1. App asks User -->
  <path d="M 200 370 Q 250 250, 200 210" fill="none" stroke="#087f5b" stroke-width="3.5" />
  <path d="M 195 230 L 200 210 L 210 225" fill="#087f5b"/>
  <rect x="230" y="270" width="160" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="310" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="#087f5b">1. "Can I read your files?"</text>

  <!-- 2. User logs in & Consents -->
  <path d="M 250 140 Q 480 100, 710 140" fill="none" stroke="#c92a2a" stroke-width="3.5" />
  <path d="M 685 128 L 710 140 L 685 152" fill="#c92a2a"/>
  <rect x="380" y="90" width="200" height="40" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="480" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#c92a2a">2. Login &amp; Consent</text>
  <text x="480" y="122" text-anchor="middle" font-size="12" fill="#1e1e1e">"Yes, but ONLY read access."</text>

  <!-- 3. Auth Server issues Token to Client -->
  <path d="M 720 200 Q 480 250, 250 410" fill="none" stroke="#862e9c" stroke-width="3.5" stroke-dasharray="8,5" />
  <path d="M 275 395 L 250 410 L 275 415" fill="#862e9c"/>
  <rect x="420" y="280" width="160" height="40" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="500" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#862e9c">3. Issues Access Token</text>
  <text x="500" y="312" text-anchor="middle" font-size="12" fill="#1e1e1e">Scope: `drive.readonly`</text>

  <!-- 4. Client uses Token on API -->
  <path d="M 250 450 Q 480 500, 710 450" fill="none" stroke="#3b82f6" stroke-width="3.5" />
  <path d="M 685 438 L 710 450 L 685 462" fill="#3b82f6"/>
  <rect x="420" y="475" width="150" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="495" y="492" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b82f6">4. Request + Bearer Token</text>

  <!-- 5. API returns Data to Client -->
  <path d="M 730 480 Q 480 570, 220 480" fill="none" stroke="#e67700" stroke-width="3.5" stroke-dasharray="8,5" />
  <path d="M 245 495 L 220 480 L 245 470" fill="#e67700"/>
  <rect x="430" y="540" width="130" height="25" fill="#ffffff" stroke="none" opacity="0.9"/>
  <text x="495" y="557" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67700">5. 200 OK + Photos</text>

  <!-- Humorous Footer -->
  <text x="480" y="620" text-anchor="middle" font-size="16" font-style="italic" fill="#adb5bd">"OAuth: Giving a random startup the keys to your house, but only the guest bathroom."</text>

</svg>
