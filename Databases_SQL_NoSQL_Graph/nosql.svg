<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', sans-serif;">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#ced4da" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#dotGrid)" />
  
  <text x="480" y="50" text-anchor="middle" font-size="24" font-weight="bold">NoSQL Flavors</text>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#e7f5ff">
    <rect x="50" y="120" width="220" height="200" rx="10" stroke-width="2" transform="rotate(-2 160 220)"/>
    <text x="160" y="150" text-anchor="middle" font-weight="bold">Document (MongoDB)</text>
    <text x="70" y="180" font-size="12" font-family="monospace" fill="#495057">{</text>
    <text x="90" y="200" font-size="12" font-family="monospace" fill="#495057">"id": 1,</text>
    <text x="90" y="220" font-size="12" font-family="monospace" fill="#495057">"name": "Abdullah",</text>
    <text x="90" y="240" font-size="12" font-family="monospace" fill="#495057">"orders": [...]</text>
    <text x="70" y="260" font-size="12" font-family="monospace" fill="#495057">}</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#fff4e6">
    <rect x="370" y="120" width="220" height="200" rx="10" stroke-width="2" transform="rotate(1 480 220)"/>
    <text x="480" y="150" text-anchor="middle" font-weight="bold">Key-Value (Redis)</text>
    <rect x="390" y="180" width="180" height="30" fill="#ffffff" stroke-width="1.5" rx="4"/>
    <text x="480" y="200" text-anchor="middle" font-size="12">user:101 → {DATA}</text>
    <rect x="390" y="230" width="180" height="30" fill="#ffffff" stroke-width="1.5" rx="4"/>
    <text x="480" y="250" text-anchor="middle" font-size="12">session:abc → {DATA}</text>
  </g>

  <g filter="url(#rough)" stroke="#1e1e1e" fill="#f3f0ff">
    <rect x="690" y="120" width="220" height="200" rx="10" stroke-width="2" transform="rotate(2 800 220)"/>
    <text x="800" y="150" text-anchor="middle" font-weight="bold">Graph (Neo4j)</text>
    <circle cx="750" cy="210" r="15" fill="#ffffff" stroke-width="2"/>
    <circle cx="850" cy="210" r="15" fill="#ffffff" stroke-width="2"/>
    <circle cx="800" cy="280" r="15" fill="#ffffff" stroke-width="2"/>
    <path d="M 765 210 L 835 210 M 760 225 L 790 265 M 840 225 L 810 265" stroke-width="1.5"/>
    <text x="800" y="205" font-size="10" text-anchor="middle">FRIENDS</text>
  </g>
</svg>
